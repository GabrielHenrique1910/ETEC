        <h3><p id="resultado"></p></h3>
    </center>

    <script>
        var cotacao = prompt("Digite a cotação atual do dólar: ")
        var dolar = prompt("Digite o valor em dolar: ")
       
        cotacao = parseFloat(cotacao);
        real = parseFloat(real);

        if (!isNaN(cotacao) && !isNaN(dolar)){
            var real = cotacao * dolar
            var resultadoElemento = document.getElementById("resultado");
            resultadoElemento.textContent = `O valor convertido para real é: R$${real}`;
    } else  {

    }
