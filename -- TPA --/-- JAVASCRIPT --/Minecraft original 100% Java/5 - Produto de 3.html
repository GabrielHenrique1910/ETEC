<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Produto de 3</h1>
    <p id="resultado"></p>
    <script>
        var numero1 = prompt("Digite o primeiro número: ")
        var numero2 = prompt("Digite o segundo número: ")
        var numero3 = prompt("Digite o terceiro número: ")

        numero1 = parseFloat(numero1);
        numero2 = parseFloat(numero2);
        numero3 = parseFloat(numero3);
        if (!isNaN(numero1) && !isNaN(numero2) && !isNaN(numero3)){
            var produto = numero1 * numero2 * numero3
            var resultadoElemento = document.getElementById("resultado");
            resultadoElemento.innerHTML = `O produto de ${numero1} * ${numero2} * ${numero3} = ${produto}.`;
    } else  {
        window.alert ("Por favor, insira um número válido.");
    }
    </script>
</body>
</html>
