<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício JavaScript</title>
</head>
<body>
    <center>
        <h1>Verificação de número Par e Impar</h1>
        <p id="resultado"></p>
    </center>
    <script>
        // Recebe o número do usuário
        let numero = prompt("Digite um número: ");

        //  Converte a entrada para número inteiro
        numero = parseInt(numero);

        //  Seleciona o elemento para exibeir o resultado
        const resultadoElemento = document.getElementById("resultado");

        //  Verifica se o número é par ou ímpar e exibe no html
        if (!isNaN(numero)) {
            if(numero % 2 === 0) {
                resultadoElemento.textContent = 'O número ${numero} é par!';
            } 
        } 
        else {
            resultadoElemento.textContent = 'O número ${numero} é impar!';
        }
        
        
    </script>
</body>
</html>
